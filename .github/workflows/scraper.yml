name: Daily Job Scraper

on:
  schedule:
    - cron: '0 8 * * *'   # 8:00 AM UTC daily
  workflow_dispatch:        # manual trigger from GitHub Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: inbox-agent/package-lock.json

      - name: Install dependencies
        working-directory: inbox-agent
        run: npm ci

      - name: Install Chromium for Puppeteer
        run: npx puppeteer browsers install chrome
        working-directory: inbox-agent

      - name: Run live scraper
        working-directory: inbox-agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          # Puppeteer must use the installed Chromium, not a local Chrome
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'false'
        run: node live_scraper.js
